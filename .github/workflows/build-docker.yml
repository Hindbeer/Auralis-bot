name: Build and Publish to DockerHub

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  auralis-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:latest
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:${{ github.sha }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  deploy:
    needs: [auralis-bot]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}
            trap 'docker compose ps; docker compose logs --tail=100 bot' ERR

            git fetch origin main
            git reset --hard origin/main

            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env

            echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login "${{ secrets.DOCKER_REGISTRY_URL }}" -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

            export AURALIS_IMAGE="${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:${{ github.sha }}"

            docker compose pull
            docker compose up -d --remove-orphans

            docker compose ps
            docker image prune -f

          script_stop: true

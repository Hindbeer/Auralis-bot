name: Build and Publish to DockerHub

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  auralis-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:latest
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:${{ github.sha }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  deploy:
    needs: [auralis-bot]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # 1. Переходим в родительскую директорию, чтобы иметь возможность клонировать в PROJECT_PATH
            # Предположим, PROJECT_PATH это /home/user/auralis-bot
            # Мы переходим на один уровень выше
            PARENT_DIR=$(dirname "${{ secrets.PROJECT_PATH }}")
            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            
            cd "$PARENT_DIR"

            # 2. Проверяем, существует ли папка и является ли она git-репозиторием
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Project not found or not a git repo. Cloning..."
              # Удаляем папку, если она есть, но не является git-репо, чтобы clone сработал
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            trap 'docker compose ps; docker compose logs --tail=100 bot' ERR

            # 3. Обновляем код
            git fetch origin main
            git reset --hard origin/main

            # 4. Создаем .env файл
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env

            # 5. Docker операции
            echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login "${{ secrets.DOCKER_REGISTRY_URL }}" -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

            export AURALIS_IMAGE="${{ secrets.DOCKER_REGISTRY_URL }}/${{ secrets.DOCKER_REGISTRY_USERNAME }}/auralis-bot:${{ github.sha }}"

            docker compose pull
            docker compose up -d --remove-orphans

            docker compose ps
            docker image prune -f

          script_stop: true
